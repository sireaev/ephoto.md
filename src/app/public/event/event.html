<app-header></app-header>
<main class="full-container">
  <div class="masonry-container m-3">
    @for (event of events().data; track event.id) {
    <div class="masonry-item">
      <div class="image-wrapper" role="button">
        <img srcset="{{event.mobileUrl}} 1x, {{event.webUrl}} 3x" width="500" height="700"
          class="img-fluid" loading="lazy" priority />
        <div class="overlay"></div>
      </div>
    </div>
    }
  </div>
</main>
<app-footer></app-footer>
