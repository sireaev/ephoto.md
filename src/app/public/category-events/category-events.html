<app-header></app-header>
<main class="container">
  <div class="row mt-5">
    @for (event of events().data; track event.id) {
      <div class="col-xl-4 col-lg-4 col-md-6 col-sm-6 mb-5">
        
        <div class="image-wrapper" role="button" [routerLink]="event.id">
          <img
            [ngSrc]="event.previewFile"
            [alt]="event.previewFile"
            width="500"
            height="700"
            class="img-fluid rounded"
            loading="lazy"
          />
          <div class="overlay"></div>
        </div>

        <div class="pt-3">
          <p class="fs-3 text-center">{{event.title}}</p>
          <p class="fs-6 text-center text-uppercase">
            Eveniment: {{event.categoryName}}
          </p>
        </div>

      </div>
    }
  </div>
</main>
<app-footer></app-footer>
