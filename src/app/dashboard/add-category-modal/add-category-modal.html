<div class="modal-header">
  <h4 class="modal-title">{{ initialData ? 'Actualizează' : 'Creează' }} categorie</h4>
</div>

<div class="modal-body">
  <form
  [formGroup]="categoryForm"
  (ngSubmit)="submit()"
  class="needs-validation"
  [class.was-validated]="submitted()"
  novalidate
>

  <!-- NAME -->
  <div class="mb-3">
    <label class="form-label">Denumire</label>
    <input
      type="text"
      class="form-control"
      formControlName="name"
      [ngClass]="controlClasses(f.name)"
    />

    <div class="valid-feedback">Validat!</div>
    <div class="invalid-feedback">
      <span *ngIf="f.name.errors?.['required']">Name is required</span>
      <span *ngIf="f.name.errors?.['minlength']">Min 3 characters</span>
    </div>
  </div>

  <!-- SLUG -->
  <div class="mb-3">
    <label class="form-label">Link</label>
    <input
      type="text"
      class="form-control"
      formControlName="slug"
      [ngClass]="controlClasses(f.slug)"
    />

    <div class="form-text">
      URL-friendly (auto-generated, you can edit)
    </div>

    <div class="valid-feedback">Validat!</div>
    <div class="invalid-feedback">
      <span *ngIf="f.slug.errors?.['required']">Slug is required</span>
      <span *ngIf="f.slug.errors?.['pattern']">
        Only lowercase letters, numbers and hyphens allowed
      </span>
    </div>
  </div>

  <!-- STATUS -->
  <div class="mb-3">
    <label class="form-label">Statut</label>

    <select
      class="form-select"
      formControlName="status"
      [ngClass]="controlClasses(f.status)"
    >
      <option value="active">Active</option>
      <option value="inactive">Inactive</option>
    </select>

    <div class="valid-feedback">Validat!</div>
    <div class="invalid-feedback">
      Status is required
    </div>
  </div>

</form>
</div>

<div class="modal-footer">
  <button
    type="button"
    class="btn-nebula"
    (click)="submit()"
  >
    {{ initialData ? 'Actualizează' : 'Creează' }}
  </button>
</div>
