<header class="topbar">
    <div class="topbar-brand">
        <div class="brand-logo">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <circle cx="14" cy="14" r="14" fill="#3366FF" />
                <path d="M8 14L12 10L16 14L20 10" stroke="white" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M8 18L12 14L16 18L20 14" stroke="white" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" opacity="0.6" />
            </svg>
        </div>
        <span class="brand-name">Ephoto.md <sub class="text-primary">v1.0 by Sireaev</sub></span>
    </div>

    <nav class="topbar-nav">
        <a class="nav-item" routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
            <i class="fas fa-th-large"></i>
            <span>Bord</span>
        </a>
        <a class="nav-item" routerLink="/admin/categories" routerLinkActive="active">
            <i class="far fa-folder"></i>
            <span>Categorii</span>
        </a>
        <a class="nav-item" routerLink="/admin/events" routerLinkActive="active">
            <i class="fas fa-calendar-alt"></i>
            <span>Evenimente</span>
        </a>
        <a class="nav-item" routerLink="/admin/clients" routerLinkActive="active">
            <i class="far fa-user"></i>
            <span>Clienti</span>
        </a>
        <a ngbDropdown class="nav-item" role="button">
            <i class="far fa-file-alt"></i>
            <span ngbDropdownToggle>Pagini</span>
            <div class="dropdown-menu" ngbDropdownMenu style="transition:none;">
                <button ngbDropdownItem class="px-0">
                    <a class="nav-item w-100" routerLink="/admin/reviews">
                        <i class="far fa-comment-dots"></i>
                        <span>Recenzii</span>
                    </a>
                </button>
                <button ngbDropdownItem class="px-0">
                    <a class="nav-item w-100" routerLink="/admin/prices">
                        <i class="fas fa-dollar-sign"></i>
                        <span>Preturi</span>
                    </a>
                </button>
                <button ngbDropdownItem class="px-0">
                    <a class="nav-item w-100" routerLink="/admin/before-after">
                        <i class="fas fa-file-alt"></i>
                        <span>Before-after</span>
                    </a>
                </button>
                <button ngbDropdownItem class="px-0">
                    <a class="nav-item w-100" routerLink="/admin/pages">
                        <i class="fas fa-file-alt"></i>
                        <span>Pagini statice</span>
                    </a>
                </button>
            </div>
        </a>
        @if (loadingService.isLoading()) {
            <a href="javascript:void(0)" class="nav-item">
                <i class="rotate-center fas fa-spinner text-blue-500"></i>
                Se încarcă…
            </a>
        }
        
        <!-- <a class="nav-item" href="#">
            <i class="bi bi-gear-fill"></i>
            <span>Settings</span>
        </a> -->
    </nav>

    <div class="topbar-actions">
        <button class="action-btn" title="Search">
            <i class="fas fa-search"></i>
        </button>
        <button class="action-btn" title="Notifications">
            <i class="bi bi-bell-fill"></i>
            <span class="far fa-envelope"></span>
        </button>
        <button class="action-btn" title="Messages">
            <i class="far fa-user"></i>
        </button>
        <div class="user-avatar">
            <img src="https://i.pravatar.cc/36?img=3" alt="User avatar" />
            <div class="user-info">
                <span class="user-name">Evelyn Harper</span>
                <span class="user-role">Admin</span>
            </div>
            <i class="bi bi-chevron-down ms-1 chevron"></i>
        </div>
    </div>
</header>
