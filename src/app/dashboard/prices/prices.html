<main class="main-content">
    <!-- Page Header -->
    <div class="page-header">
        <div>
            <h1 class="page-title">Blocuri de prețuri</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a routerLink="/admin">Acasă</a></li>
                    <li class="breadcrumb-item active">Blocuri de prețuri</li>
                </ol>
            </nav>
        </div>
        <div class="page-header-actions">
            <button class="btn-outline-nebula gap-2">
                <i class="far fa-file-excel"></i>Export
            </button>
            <button class="btn-nebula gap-2" (click)="openPriceModal()">
                <i class="fas fa-plus"></i>Adaugă bloc de preț
            </button>
        </div>
    </div>

    <!-- Table -->
    <div class="card-nebula">
        <div class="card-header-nebula">
            <h5 class="card-title-nebula">Blocuri de prețuri recente</h5>
            <a class="view-all">View all</a>
        </div>
        <div class="table-wrapper">
            <table class="nebula-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nume</th>
                        <th>Preț</th>
                        <th>Status</th>
                        <th>Opțiuni</th>
                        <th>Acțiuni</th>
                    </tr>
                </thead>
                <tbody>
                    @for(price of prices()?.data; track price.id) {
                        <tr>
                            <td class="text-muted">{{ price.id }}</td>
                            <td>
                               {{ price.name }}
                            </td>
                            <td>{{ price.price }}</td>
                            <td>
                                <span class="status-badge" [ngClass]="price.status">{{ price.status || 'nedefinit' }}</span>
                            </td>
                            <td> {{price.options}} </td>
                            <td class="d-flex gap-2">
                                <i placement="top" ngbTooltip="Editează" (click)="openPriceModal(price)" role="button" class="fas fa-pen text-primary fs-6"></i>
                                <i placement="top" ngbTooltip="Șterge" (click)="openDeleteModal(price.id!)" role="button" class="fas fa-trash text-danger fs-6"></i>
                            </td>
                        </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</main>
